<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sui Global Rewards - Game UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #1e5631 0%, #0a1f12 100%);
            color: white; font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Top Header Status Bar */
        .top-header {
            width: 95%; display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
        }
        .user-profile { display: flex; align-items: center; gap: 8px; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffcc00; }
        .status-items { display: flex; gap: 10px; }
        .status-box {
            background: rgba(0, 0, 0, 0.6); border-radius: 20px; padding: 4px 12px;
            display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }

        /* Balance Display */
        .balance-container { text-align: center; margin-top: 20px; }
        .dollar-sign { color: #ffcc00; font-size: 24px; }
        .main-balance { font-size: 45px; font-weight: bold; color: #fff; text-shadow: 2px 2px #000; }
        
        .progress-container {
            width: 80%; background: rgba(0,0,0,0.3); height: 10px; border-radius: 10px; margin: 10px auto; overflow: hidden;
            border: 1px solid #4dff88;
        }
        .progress-bar { width: 45%; height: 100%; background: linear-gradient(90deg, #4dff88, #00ff00); }

        /* Main Game Area with Side Buttons */
        .game-layout {
            display: flex; width: 95%; justify-content: space-between; align-items: center; margin-top: 20px;
        }
        .side-menu { display: flex; flex-direction: column; gap: 15px; }
        
        .menu-icon-btn {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            width: 50px; height: 50px; border-radius: 12px; border: 3px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px #b36b00; cursor: pointer; color: #333;
        }
        .menu-icon-btn i { font-size: 20px; }
        .menu-icon-btn span { font-size: 8px; font-weight: bold; margin-top: 2px; text-transform: uppercase; }

        /* Center Spin Wheel */
        .wheel-box { position: relative; width: 220px; height: 220px; }
        .wheel-img {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #ffcc00;
            background: conic-gradient(#ff4d4d 0deg 45deg, #4dff88 45deg 90deg, #4d94ff 90deg 135deg, #ffff4d 135deg 180deg, #ff4dff 180deg 225deg, #ff944d 225deg 270deg, #4dffff 270deg 315deg, #ffffff 315deg 360deg);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
        .spin-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; color: #ffcc00; padding: 10px; border-radius: 50%;
            border: 3px solid #ffcc00; font-size: 10px; font-weight: bold; text-align: center;
        }

        /* Footer Action Buttons */
        .footer-action {
            width: 90%; margin-top: 30px; display: flex; flex-direction: column; gap: 10px;
        }
        .invite-btn {
            background: linear-gradient(180deg, #4dff88 0%, #28a745 100%);
            border: none; padding: 15px; border-radius: 15px; color: white;
            font-size: 18px; font-weight: bold; box-shadow: 0 5px #1a632b; text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="user-profile">
            <img src="https://via.placeholder.com/35" id="user-avatar">
            <span id="user-name" style="font-size: 12px;">Player</span>
        </div>
        <div class="status-items">
            <div class="status-box">⚡ <span>0</span></div>
            <div class="status-box">🪙 <span>0</span></div>
            <div class="status-box">💎 <span id="gems">10</span></div>
        </div>
    </div>

    <div class="balance-container">
        <div class="main-balance"><span class="dollar-sign">$</span><span id="bal">0.949</span></div>
        <div style="font-size: 11px; margin-top: 5px;">Only $0.051 to cash out $1! 🚀</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div class="game-layout">
        <div class="side-menu">
            <div class="menu-icon-btn" onclick="tgAlert('Gift')">
                <i class="fas fa-gift"></i><span>Gift</span>
            </div>
            <div class="menu-icon-btn" onclick="tgAlert('Leaderboard')">
                <i class="fas fa-trophy"></i><span>Rank</span>
            </div>
            <div class="menu-icon-btn" onclick="tgAlert('Team')">
                <i class="fas fa-users"></i><span>Team</span>
            </div>
        </div>

        <div class="wheel-box">
            <div class="wheel-img" id="wheel"></div>
            <div class="spin-center" onclick="spinNow()">SPIN FOR<br>1K 💎</div>
        </div>

        <div class="side-menu">
            <div class="menu-icon-btn" onclick="tgAlert('Spins')">
                <i class="fas fa-sync-alt"></i><span>Spins</span>
            </div>
            <div class="menu-icon-btn" onclick="tgAlert('Sign In')">
                <i class="fas fa-calendar-check"></i><span>Sign In</span>
            </div>
            <div class="menu-icon-btn" style="background: #ffcc00;" onclick="tgAlert('Wallet')">
                <i class="fas fa-wallet"></i><span>Wallet</span>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="invite-btn" onclick="invite()">🚀 Invite for Spins!</button>
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 20px; opacity: 0.8;">
            <i class="fab fa-whatsapp"></i> <i class="fab fa-twitter"></i> <i class="fab fa-facebook"></i>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Player";

        function tgAlert(msg) {
            tg.showAlert(msg + " feature coming soon!");
        }

        let rotation = 0;
        function spinNow() {
            let gems = parseInt(document.getElementById('gems').innerText);
            if(gems < 1) {
                tg.showAlert("Not enough Gems!"); return;
            }
            document.getElementById('gems').innerText = gems - 1;
            rotation += 1800 + Math.random() * 360;
            document.getElementById('wheel').style.transition = "transform 4s cubic-bezier(0.17, 0.67, 0.1, 1)";
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                tg.showAlert("You won $0.005!");
                let b = parseFloat(document.getElementById('bal').innerText);
                document.getElementById('bal').innerText = (b + 0.005).toFixed(3);
            }, 4100);
        }

        function invite() {
            tg.openTelegramLink("https://t.me/share/url?url=https://t.me/SuiGlobalRewardsBot/app&text=Join me!");
        }
    </script>
</body>
</html>
