<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(180deg, #1a4d2e 0%, #0d2a1a 100%);
            color: white; font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        .header { width: 90%; display: flex; justify-content: space-between; margin-top: 20px; }
        .user-info { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.1); border: 2px solid #ffcc00;
            border-radius: 15px; padding: 10px 30px; margin: 20px 0; text-align: center;
        }
        .usd-amount { font-size: 32px; color: #ffcc00; font-weight: bold; }

        /* The Spin Wheel */
        .wheel-container { position: relative; width: 280px; height: 280px; margin-top: 20px; }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #ffcc00;
            background: conic-gradient(#ff4d4d 0deg 45deg, #4dff88 45deg 90deg, #4d94ff 90deg 135deg, #ffff4d 135deg 180deg, #ff4dff 180deg 225deg, #ff944d 225deg 270deg, #4dffff 270deg 315deg, #ffffff 315deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 1);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 40px; background: #ffcc00; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10;
        }
        .spin-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: #000; border: 4px solid #ffcc00;
            border-radius: 50%; color: #ffcc00; font-weight: bold; cursor: pointer; z-index: 11;
        }

        .footer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 30px; }
        .action-btn { background: #28a745; border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; box-shadow: 0 4px #1a632b; }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info" id="user-name">👤 Player</div>
        <div class="user-info">💎 <span id="gems">10</span></div>
    </div>

    <div class="balance-card">
        <div style="font-size: 14px; opacity: 0.8;">Current Earnings</div>
        <div class="usd-amount">$<span id="bal">0.000</span></div>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <button class="spin-btn" onclick="spin()">SPIN</button>
    </div>

    <div class="footer-btns">
        <button class="action-btn" onclick="openTasks()">📋 TASKS</button>
        <button class="action-btn" style="background:#ffcc00; color:black; box-shadow: 0 4px #b38f00;" onclick="withdraw()">💰 WALLET</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('user-name').innerText = "👤 " + (tg.initDataUnsafe.user?.first_name || "Guest");

        let currentRotation = 0;
        function spin() {
            let gems = parseInt(document.getElementById('gems').innerText);
            if(gems < 1) {
                tg.showAlert("Not enough Gems! Complete tasks to get more spins.");
                return;
            }
            
            document.getElementById('gems').innerText = gems - 1;
            let addedRotation = Math.floor(Math.random() * 360) + 1800; // 5 full spins
            currentRotation += addedRotation;
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                let win = (Math.random() * 0.05).toFixed(3);
                let currentBal = parseFloat(document.getElementById('bal').innerText);
                document.getElementById('bal').innerText = (currentBal + parseFloat(win)).toFixed(3);
                tg.showAlert("Congratulations! You won $" + win);
            }, 4100);
        }

        function withdraw() {
            const wallet = prompt("Enter your SUI Address:");
            if(wallet) tg.sendData(wallet);
        }
        function openTasks() {
            window.open("https://www.cpalead.com/your_link"); // እዚህ ጋር የ CPALead ሊንክህን አስገባ
        }
    </script>
</body>
</html>
