<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sui Premium - Cheelee Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --accent: #00f2ff; --bg: #050f08; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }

        /* Snap Scroll Container */
        .main-container {
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .main-container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh; scroll-snap-align: start; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Top HUD */
        .top-hud {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; padding: 15px 20px; box-sizing: border-box;
        }
        .stat { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; font-weight: bold; }

        /* Center Content - Section 1: The Spin */
        .spin-card {
            background: rgba(255, 255, 255, 0.05); width: 85%; padding: 30px 20px;
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold);
            background: conic-gradient(#ff3b3b, #ffcc00, #3498db, #2ecc71, #9b59b6, #e67e22);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid var(--gold); z-index: 10; }
        
        /* Section 2: Tasks & Gift */
        .task-list { width: 85%; display: flex; flex-direction: column; gap: 15px; }
        .task-item {
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent);
        }

        /* Action Button */
        .action-btn {
            background: linear-gradient(90deg, var(--gold), #ff9100);
            border: none; padding: 15px 40px; border-radius: 50px; color: #000;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3);
        }

        /* Background Glows */
        .glow { position: absolute; width: 300px; height: 300px; background: rgba(0, 242, 255, 0.1); border-radius: 50%; filter: blur(80px); z-index: -1; }
    </style>
</head>
<body>

    <div class="top-hud">
        <div class="stat" style="color: var(--gold);"><i class="fas fa-coins"></i> $<span id="bal">0.00</span></div>
        <div class="stat"><i class="fas fa-bolt" style="color: var(--accent);"></i> <span id="nrg">50</span></div>
    </div>

    <div class="main-container">
        <section>
            <div class="glow"></div>
            <div class="spin-card">
                <p style="margin: 0; opacity: 0.6; font-size: 12px; letter-spacing: 2px;">LUCKY WHEEL</p>
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <div class="wheel" id="wheel"></div>
                </div>
                <button class="action-btn" onclick="spinNow()">SPIN AGAIN</button>
            </div>
            <p style="margin-top: 20px; font-size: 12px; opacity: 0.5;">Scroll down for Tasks ↓</p>
        </section>

        <section>
            <div class="glow" style="background: rgba(255, 204, 0, 0.1); bottom: 10%;"></div>
            <h2 style="margin-bottom: 20px;">Daily Rewards</h2>
            <div class="task-list">
                <div class="task-item">
                    <div><b>Follow Twitter</b><br><small>+50 Gems</small></div>
                    <i class="fab fa-twitter" style="font-size: 20px;"></i>
                </div>
                <div class="task-item" style="border-left-color: var(--gold);">
                    <div><b>Invite 5 Friends</b><br><small>+$0.50 Reward</small></div>
                    <i class="fas fa-users" style="font-size: 20px;"></i>
                </div>
                <div class="task-item">
                    <div><b>Daily Check-in</b><br><small>+5 Energy</small></div>
                    <i class="fas fa-calendar-check" style="font-size: 20px;"></i>
                </div>
            </div>
            <p style="margin-top: 40px; font-size: 12px; opacity: 0.5;">Scroll up to Spin ↑</p>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSZ1lt-9O14sOf0PoOGDT36gT1Rusrbog",
            authDomain: "protestant-muzmur.firebaseapp.com",
            projectId: "protestant-muzmur",
            databaseURL: "https://protestant-muzmur-default-rtdb.firebaseio.com",
            appId: "1:927703829469:web:77a5913d7536e51a24c434"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tg = window.Telegram.WebApp;
        tg.expand();

        let userId = tg.initDataUnsafe.user?.id || "guest";
        let stats = { bal: 0.00, energy: 50 };

        // Firebase Data Loading
        const userRef = ref(db, 'users/' + userId);
        get(userRef).then(snap => {
            if(snap.exists()) stats = snap.val();
            updateUI();
        });

        let rotation = 0;
        window.spinNow = function() {
            if(stats.energy < 5) { tg.showAlert("Energy low! Wait or Invite friends."); return; }
            
            stats.energy -= 5;
            rotation += 1800 + Math.random() * 360;
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                let prize = (Math.random() * 0.05).toFixed(2);
                stats.bal = parseFloat(stats.bal) + parseFloat(prize);
                set(userRef, stats);
                updateUI();
                tg.showAlert("Congratulations! You won $" + prize);
            }, 4000);
        };

        function updateUI() {
            document.getElementById('bal').innerText = stats.bal.toFixed(2);
            document.getElementById('nrg').innerText = stats.energy;
        }
    </script>
</body>
</html>
