<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sui Global Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00f2ff; --secondary: #001a2c; --accent: #ff007a; }
        body {
            background: radial-gradient(circle at center, #003355 0%, #000a12 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        /* Glass Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 20px; width: 90%; margin: 15px 0;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .balance-title { font-size: 14px; opacity: 0.7; letter-spacing: 2px; }
        .balance-amount { font-size: 38px; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px rgba(0,242,255,0.5); }
        
        /* Game Section */
        .game-btn {
            background: linear-gradient(45deg, var(--accent), #ff4d00);
            border: none; color: white; padding: 15px; border-radius: 15px;
            width: 100%; font-weight: bold; font-size: 18px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 0, 122, 0.4);
        }
        .game-btn:active { transform: scale(0.95); }

        /* Task List */
        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .claim-btn { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .sui-logo { width: 80px; animation: float 3s ease-in-out infinite; margin-top: 20px; }
    </style>
</head>
<body>

    <img src="https://cryptologos.cc/logos/sui-sui-logo.png" class="sui-logo" alt="Sui">
    
    <div class="glass-card" style="text-align: center;">
        <div class="balance-title">TOTAL SUI REWARDS</div>
        <div class="balance-amount" id="bal">1,240.50</div>
        <div style="font-size: 12px; color: #00ff88; margin-top: 5px;">+2.4% LIVE GAIN</div>
    </div>

    <div class="glass-card">
        <h3 style="margin-top:0;">🎰 Daily Spin & Win</h3>
        <p style="font-size:12px; opacity:0.8;">Try your luck to win up to 500 $SUI!</p>
        <button class="game-btn" onclick="playGame()">SPIN NOW</button>
    </div>

    <div class="glass-card">
        <h3 style="margin-top:0;">📋 High Yield Tasks</h3>
        <div class="task-item">
            <span>Ecosystem Survey</span>
            <button class="claim-btn" onclick="startSurvey()">+150 SUI</button>
        </div>
        <div class="task-item">
            <span>Invite 5 Friends</span>
            <button class="claim-btn" onclick="invite()">+500 SUI</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function playGame() {
            let win = Math.floor(Math.random() * 100);
            tg.showConfirm(`You won ${win} $SUI! Collect now?`, (ok) => {
                if(ok) {
                    let currentBal = parseFloat(document.getElementById('bal').innerText.replace(',',''));
                    document.getElementById('bal').innerText = (currentBal + win).toLocaleString();
                }
            });
        }

        function startSurvey() {
            // እዚህ ጋር የ CPALead ሊንክህን ትጨምራለህ
            tg.showAlert("Opening partner survey... Complete it to earn rewards!");
            window.open("https://eskinderbirhanuu.github.io/sui-web-app/"); // ለጊዜው የራሱ ሊንክ
        }

        function invite() {
            tg.openTelegramLink("https://t.me/share/url?url=https://t.me/SuiGlobalRewardsBot/app&text=Join me on Sui Rewards and get 1000 SUI!");
        }
    </script>
</body>
</html>
