<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sui Global Premium - Cloud Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSZ1lt-9O14sOf0PoOGDT36gT1Rusrbog",
            authDomain: "protestant-muzmur.firebaseapp.com",
            projectId: "protestant-muzmur",
            databaseURL: "https://protestant-muzmur-default-rtdb.firebaseio.com",
            storageBucket: "protestant-muzmur.firebasestorage.app",
            messagingSenderId: "927703829469",
            appId: "1:927703829469:web:77a5913d7536e51a24c434"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GAME LOGIC START ---
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let userId = tg.initDataUnsafe.user?.id || "guest_user";
        let userStats = { bal: 0.0, gems: 100, energy: 50 };

        // 1. Load from Cloud (Firebase)
        const userRef = ref(db, 'users/' + userId);
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                userStats = snapshot.val();
            } else {
                set(userRef, userStats); // New user
            }
            updateUI();
        });

        window.saveToCloud = function() {
            set(userRef, userStats);
        };

        window.updateUI = function() {
            document.getElementById('balance').innerText = userStats.bal.toFixed(3);
            document.getElementById('gems').innerText = userStats.gems;
            document.getElementById('energy').innerText = userStats.energy;
            document.getElementById('pbar').style.width = Math.min((userStats.bal * 100), 100) + "%";
        };

        let rotation = 0;
        window.startSpin = function() {
            if(userStats.energy < 5) {
                tg.showAlert("Not enough Energy! ⚡"); return;
            }
            userStats.energy -= 5;
            rotation += 1800 + Math.random() * 360;
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                let win = (Math.random() * 0.01).toFixed(3);
                userStats.bal += parseFloat(win);
                userStats.gems += 5;
                tg.HapticFeedback.notificationOccurred('success');
                window.saveToCloud(); // Save immediately
                window.updateUI();
                tg.showAlert(`🔥 Success! You earned $${win}`);
            }, 4000);
        };
    </script>

    <style>
        :root { --gold: #ffcc00; --green: #2ecc71; --dark: #050f08; }
        body {
            background: radial-gradient(circle at center, #1e5631 0%, var(--dark) 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }
        .header { width: 90%; display: flex; justify-content: space-between; padding: 15px 0; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        .main-balance { text-align: center; margin-top: 15px; }
        .val { font-size: 55px; font-weight: 900; color: white; margin: 0; }
        .val span { color: var(--gold); }
        
        .progress-bar { width: 220px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px auto; border: 1px solid var(--green); overflow: hidden; }
        .fill { height: 100%; background: var(--green); box-shadow: 0 0 10px var(--green); transition: 0.5s; }

        .game-area { display: grid; grid-template-columns: 1fr 240px 1fr; width: 95%; align-items: center; margin-top: 20px; }
        .side-menu { display: flex; flex-direction: column; gap: 15px; }
        .icon-btn { 
            width: 55px; height: 55px; background: linear-gradient(180deg, #ffde59 0%, #ff914d 100%);
            border-radius: 15px; border: 3px solid white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #333; box-shadow: 0 4px 0 #b36b00;
        }

        .wheel-container { position: relative; width: 230px; height: 230px; }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(#e74c3c, #2ecc71, #3498db, #f1c40f, #9b59b6, #e67e22, #1abc9c, #ecf0f1);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 25px rgba(255,204,0,0.3);
        }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65px; height: 65px; background: black; border: 3px solid var(--gold);
            border-radius: 50%; color: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; cursor: pointer; z-index: 10;
        }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--gold); z-index: 5; }

        .footer { width: 90%; margin-top: auto; padding-bottom: 25px; }
        .invite-btn { width: 100%; background: linear-gradient(180deg, #52cc7a 0%, #207a3d 100%); border: none; padding: 18px; border-radius: 20px; color: white; font-size: 22px; font-weight: 900; box-shadow: 0 6px 0 #144d26; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box">⚡ <span id="energy">50</span></div>
        <div class="stat-box">💎 <span id="gems">100</span></div>
    </div>

    <div class="main-balance">
        <p style="margin:0; font-size:12px; opacity:0.7;">CLOUD SYNC ACTIVE 🟢</p>
        <h1 class="val"><span>$</span><span id="balance">0.000</span></h1>
        <div class="progress-bar"><div class="fill" id="pbar"></div></div>
    </div>

    <div class="game-area">
        <div class="side-menu">
            <div class="icon-btn"><i class="fas fa-gift"></i><span style="font-size:8px;">GIFT</span></div>
            <div class="icon-btn"><i class="fas fa-users"></i><span style="font-size:8px;">TEAM</span></div>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center" onclick="startSpin()">SPIN<br>FREE</div>
        </div>

        <div class="side-menu">
            <div class="icon-btn"><i class="fas fa-tasks"></i><span style="font-size:8px;">TASKS</span></div>
            <div class="icon-btn" style="background:var(--gold)"><i class="fas fa-wallet"></i><span style="font-size:8px;">WALLET</span></div>
        </div>
    </div>

    <div class="footer">
        <button class="invite-btn" onclick="tg.showAlert('Share link copied!')">🚀 INVITE FRIENDS</button>
    </div>

</body>
</html>
